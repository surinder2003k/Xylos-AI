<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <g transform="translate(256,256)">
    <!-- Left arm of X -->
    <path
      d="M-90,-90 L-20,0 L-90,90"
      stroke="#000000"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Right arm of X -->
    <path
      d="M90,-90 L20,0 L90,90"
      stroke="#000000"
      stroke-width="28"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
    />

    <!-- Center node -->
    <circle
      cx="0" cy="0" r="16"
      fill="#000000"
      opacity="0.9"
    />

    <!-- Corner neural dots -->
    <circle cx="-90" cy="-90" r="8" fill="#000000" opacity="0.6"/>
    <circle cx="90" cy="-90" r="8" fill="#000000" opacity="0.6"/>
    <circle cx="-90" cy="90" r="8" fill="#000000" opacity="0.6"/>
    <circle cx="90" cy="90" r="8" fill="#000000" opacity="0.6"/>
  </g>
</svg>
